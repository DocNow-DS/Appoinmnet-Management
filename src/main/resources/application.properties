spring.application.name=appointment-management
#spring.data.mongodb.uri=mongodb+srv://dbuser:dbuser2026@test.ubtlnvl.mongodb.net/client?appName=TEST
spring.data.mongodb.uri=mongodb://localhost:27017/HealthCare
server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

services.doctor.base-url=${DOCTOR_SERVICE_BASE_URL:http://localhost:8082}

appointment.default-duration-minutes=${APPOINTMENT_DEFAULT_DURATION_MINUTES:30}

# JWT configuration for Spring Security Resource Server (appointment endpoints).
# Provide ONE of the following:
# - JWT_SECRET (HS256/HS512 symmetric signing)
# - JWT_JWK_SET_URI (public JWK set)
# - JWT_ISSUER_URI (issuer discovery)
# For local dev you can keep a default; in production, always override this via env var.
# WARNING: Do not commit real secrets or use dev defaults in production.
JWT_SECRET=${JWT_SECRET:dev-secret-change-me}
JWT_ALGORITHM=${JWT_ALGORITHM:HmacSHA256}
JWT_JWK_SET_URI=${JWT_JWK_SET_URI:}
JWT_ISSUER_URI=${JWT_ISSUER_URI:}
