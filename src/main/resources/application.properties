spring.application.name=appointment-management
#spring.data.mongodb.uri=mongodb+srv://dbuser:dbuser2026@test.ubtlnvl.mongodb.net/client?appName=TEST
spring.data.mongodb.uri=mongodb://localhost:27017/HealthCare

# Listen port for THIS app only — uses appointment.management.port (NOT SERVER_PORT; see AppointmentListenPortCustomizer).
# Override: APPOINTMENT_MANAGEMENT_PORT=8080
appointment.management.port=8080

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Outbound: patient-management (doctor user profiles + public directory).
services.patient.base-url=${PATIENT_SERVICE_BASE_URL:http://localhost:8081}
# Outbound: doctor-management-service (runs on 8082 by default).
services.doctor.base-url=${DOCTOR_SERVICE_BASE_URL:http://localhost:8082}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8084}

appointment.default-duration-minutes=${APPOINTMENT_DEFAULT_DURATION_MINUTES:30}

# JWT configuration
jwt.secret=${JWT_SECRET:dev-secret-change-me}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
